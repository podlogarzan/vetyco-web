    <style>
      :root {
        --green: #4db87d;
        --ink: #f3f3f5;
        --muted: #9a9aa1;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh;
        background: #000; color: var(--ink);
        font-family: var(--font); -webkit-font-smoothing: antialiased;
        display: grid; place-items: center;
        padding: 40px 22px; overflow-x: hidden; position: relative;
      }
      a { color: inherit; text-decoration: none; }

      /* drifting aurora */
      .aura { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
      .aura i {
        position: absolute; border-radius: 50%; filter: blur(90px);
        background: radial-gradient(circle, rgba(77,184,125,.55), transparent 70%);
      }
      .aura i:nth-child(1) { width: 60vmax; height: 60vmax; top: -18vmax; left: -12vmax; animation: drift1 22s ease-in-out infinite; }
      .aura i:nth-child(2) { width: 46vmax; height: 46vmax; bottom: -16vmax; right: -10vmax; opacity: .75; animation: drift2 27s ease-in-out infinite; }
      @keyframes drift1 { 50% { transform: translate(12vmax, 8vmax) scale(1.15); } }
      @keyframes drift2 { 50% { transform: translate(-10vmax, -9vmax) scale(1.2); } }

      main { position: relative; z-index: 1; text-align: center; max-width: 760px; }

      .wm { width: min(190px, 46vw); height: auto; opacity: .95; }

      .eyebrow {
        margin: 34px 0 10px; font-size: 12.5px; font-weight: 700;
        letter-spacing: .42em; text-transform: uppercase; color: var(--green);
      }
      h1 {
        margin: 0; font-size: clamp(46px, 11vw, 118px);
        font-weight: 800; letter-spacing: -0.045em; line-height: .92;
        background: linear-gradient(180deg, #ffffff 30%, #4db87d 140%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .tag {
        margin: 26px auto 0; max-width: 46ch; color: var(--muted);
        font-size: clamp(15px, 2.1vw, 18.5px); line-height: 1.55;
      }
      .tag b { color: var(--ink); font-weight: 600; }

      .count { display: flex; gap: clamp(8px, 2vw, 18px); justify-content: center; margin: 44px 0 0; }
      .count div {
        min-width: clamp(66px, 17vw, 104px);
        padding: 16px 10px 13px;
        border: 1px solid #23261f; border-radius: 18px;
        background: rgba(255,255,255,.035); backdrop-filter: blur(6px);
      }
      .count span {
        display: block; font-size: clamp(26px, 6vw, 44px); font-weight: 800;
        letter-spacing: -0.03em; font-variant-numeric: tabular-nums; line-height: 1;
      }
      .count small {
        display: block; margin-top: 8px; font-size: 10.5px; font-weight: 700;
        letter-spacing: .2em; text-transform: uppercase; color: var(--muted);
      }

      .back {
        display: inline-flex; align-items: center; gap: 9px; margin-top: 46px;
        padding: 13px 26px; border-radius: 999px;
        background: var(--green); color: #10231a; font-weight: 700; font-size: 15px;
        transition: transform .2s ease, background .2s ease;
      }
      .back:hover { background: #5ed08e; transform: translateY(-2px); }

      footer { margin-top: 40px; font-size: 13px; color: #62626a; }
      footer a { color: var(--muted); font-weight: 600; }
      footer a:hover { color: var(--green); }
      footer span { margin: 0 9px; }

      @media (prefers-reduced-motion: reduce) { .aura i { animation: none; } }
    </style>

    <script>
      var target = new Date("2026-08-01T00:00:00").getTime();
      var box = document.getElementById("count");
      function pad(n) { return n < 10 ? "0" + n : "" + n; }
      function tick() {
        var left = target - Date.now();
        if (left <= 0) {
          box.innerHTML = "<div style='min-width:auto;padding:18px 30px'><span>It's here 🎉</span></div>";
          return;
        }
        var s = Math.floor(left / 1000);
        document.getElementById("d").textContent = Math.floor(s / 86400);
        document.getElementById("h").textContent = pad(Math.floor(s / 3600) % 24);
        document.getElementById("m").textContent = pad(Math.floor(s / 60) % 60);
        document.getElementById("s").textContent = pad(s % 60);
        setTimeout(tick, 1000);
      }
      tick();
    </script>
